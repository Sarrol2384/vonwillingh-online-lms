<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Module 2 JSON Uploader</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-8">
    <div class="max-w-4xl mx-auto">
        <div class="bg-white rounded-lg shadow-lg p-8">
            <h1 class="text-3xl font-bold text-gray-800 mb-6">📚 Module 2 Content Uploader</h1>
            
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Paste Module 2 JSON Content:
                </label>
                <textarea id="jsonInput" rows="15" 
                    class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono text-sm"
                    placeholder='Paste the MODULE_2_CONTENT.json here...'></textarea>
            </div>

            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Course ID (the Leadership course):
                </label>
                <input type="number" id="courseId" 
                    class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="Enter course ID (e.g., 1, 2, 3...)">
            </div>

            <button onclick="uploadModule()" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-lg transition duration-200">
                🚀 Upload Module 2
            </button>

            <div id="result" class="mt-6 hidden"></div>
        </div>

        <div class="bg-blue-50 border-l-4 border-blue-400 p-4 mt-6">
            <div class="flex">
                <div class="flex-shrink-0">
                    <svg class="h-5 w-5 text-blue-400" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"/>
                    </svg>
                </div>
                <div class="ml-3">
                    <h3 class="text-sm font-medium text-blue-800">Instructions:</h3>
                    <div class="mt-2 text-sm text-blue-700">
                        <ol class="list-decimal list-inside space-y-1">
                            <li>Copy the JSON content from MODULE_2_CONTENT.json</li>
                            <li>Paste it in the textarea above</li>
                            <li>Find your Leadership course ID in Supabase (courses table)</li>
                            <li>Enter the course ID</li>
                            <li>Click "Upload Module 2"</li>
                        </ol>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function uploadModule() {
            const jsonInput = document.getElementById('jsonInput').value.trim();
            const courseId = document.getElementById('courseId').value.trim();
            const resultDiv = document.getElementById('result');

            // Validation
            if (!jsonInput) {
                showResult('error', '❌ Please paste the JSON content');
                return;
            }

            if (!courseId) {
                showResult('error', '❌ Please enter the Course ID');
                return;
            }

            let moduleData;
            try {
                moduleData = JSON.parse(jsonInput);
            } catch (e) {
                showResult('error', '❌ Invalid JSON format: ' + e.message);
                return;
            }

            // Validate structure
            if (!moduleData.modules || !Array.isArray(moduleData.modules)) {
                showResult('error', '❌ JSON must have a "modules" array');
                return;
            }

            // Show loading
            showResult('loading', '⏳ Uploading Module 2...');

            try {
                const response = await fetch('/api/courses/external-import', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        courseId: parseInt(courseId),
                        modules: moduleData.modules
                    })
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    showResult('success', `✅ Success! Module 2 created with ID: ${result.moduleIds ? result.moduleIds[0] : 'N/A'}`);
                } else {
                    showResult('error', `❌ Upload failed: ${result.error || result.message || 'Unknown error'}`);
                }
            } catch (error) {
                showResult('error', `❌ Network error: ${error.message}`);
            }
        }

        function showResult(type, message) {
            const resultDiv = document.getElementById('result');
            resultDiv.classList.remove('hidden');
            
            const colors = {
                success: 'bg-green-50 border-green-400 text-green-800',
                error: 'bg-red-50 border-red-400 text-red-800',
                loading: 'bg-blue-50 border-blue-400 text-blue-800'
            };

            resultDiv.className = `mt-6 p-4 border-l-4 ${colors[type] || colors.loading}`;
            resultDiv.innerHTML = `<p class="font-medium">${message}</p>`;
        }
    </script>
</body>
</html>
