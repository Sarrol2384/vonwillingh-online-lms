<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Import - VonWillingh v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 p-8">
    <div class="max-w-4xl mx-auto">
        <div class="bg-white rounded-lg shadow-lg p-6">
            <h1 class="text-2xl font-bold mb-2">📚 Course Import Tool</h1>
            <p class="text-xs text-gray-500 mb-4">Version 2 - Updated 2026-02-11 20:30</p>
            
            <div class="mb-4 p-3 bg-green-50 border border-green-200 rounded">
                <p class="text-sm text-green-800">✅ Connected to Supabase</p>
            </div>
            
            <div class="mb-4">
                <label class="block text-sm font-medium mb-2">Upload JSON File:</label>
                <input type="file" id="fileInput" accept=".json" class="block w-full text-sm border rounded p-2"/>
            </div>
            
            <div id="preview" class="hidden mb-4 p-4 bg-blue-50 border border-blue-200 rounded">
                <h3 class="font-bold mb-2">Preview:</h3>
                <div id="previewContent"></div>
            </div>
            
            <button id="importBtn" onclick="handleImport()" class="px-6 py-3 bg-blue-600 text-white rounded hover:bg-blue-700 disabled:bg-gray-400 disabled:cursor-not-allowed" disabled>
                Import Course
            </button>
            
            <div id="error" class="hidden mt-4 p-4 bg-red-50 border border-red-300 rounded text-red-800"></div>
            
            <div id="progress" class="hidden mt-4 p-4 bg-gray-50 border rounded">
                <h3 class="font-bold mb-2">Progress:</h3>
                <div id="progressLog" class="text-sm space-y-1 font-mono max-h-96 overflow-y-auto"></div>
            </div>
            
            <div id="result" class="hidden mt-4 p-4 rounded"></div>
        </div>
    </div>

    <script>
        console.log('Script loading...');
        
        const supabase = window.supabase.createClient(
            'https://laqauvikkazfpurknfkf.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxhcWF1dmlrYW96ZnB1cmtuZ2tmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk5NTg1NjksImV4cCI6MjA4NTUzNDU2OX0.Lte-s41-oBz8GsjQISJ_RgG9ZDE2couNVVP6b12aJl8'
        );
        
        let courseData = null;
        
        console.log('Supabase client created');
        
        // File input handler
        document.getElementById('fileInput').addEventListener('change', async function(e) {
            console.log('=== FILE CHANGE EVENT ===');
            const file = e.target.files[0];
            if (!file) {
                console.log('No file selected');
                return;
            }
            
            console.log('File:', file.name, 'Size:', file.size);
            
            try {
                const text = await file.text();
                console.log('File read successfully, length:', text.length);
                
                courseData = JSON.parse(text);
                console.log('JSON parsed successfully');
                console.log('Course:', courseData.course.name);
                console.log('Modules:', courseData.modules.length);
                
                // Show preview
                document.getElementById('preview').classList.remove('hidden');
                document.getElementById('previewContent').innerHTML = `
                    <p><strong>Course:</strong> ${courseData.course.name}</p>
                    <p><strong>Code:</strong> ${courseData.course.code}</p>
                    <p><strong>Level:</strong> ${courseData.course.level}</p>
                    <p><strong>Modules:</strong> ${courseData.modules.length}</p>
                    <p><strong>Quiz Questions:</strong> ${courseData.modules[0].quiz.questions.length}</p>
                `;
                
                // Enable button
                const btn = document.getElementById('importBtn');
                btn.disabled = false;
                console.log('Button enabled!');
                
            } catch (error) {
                console.error('Error:', error);
                showError('Failed to read file: ' + error.message);
            }
        });
        
        // Import handler (global function for onclick)
        window.handleImport = async function() {
            console.log('=== IMPORT CLICKED ===');
            console.log('courseData exists:', !!courseData);
            
            if (!courseData) {
                alert('Please upload a file first');
                return;
            }
            
            console.log('Starting import process...');
            document.getElementById('progress').classList.remove('hidden');
            document.getElementById('importBtn').disabled = true;
            document.getElementById('error').classList.add('hidden');
            
            try {
                await importCourse();
            } catch (error) {
                console.error('Import failed:', error);
                log('❌ ERROR: ' + error.message);
                showError('Import failed: ' + error.message);
                document.getElementById('importBtn').disabled = false;
            }
        };
        
        function showError(msg) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = '❌ ' + msg;
            errorDiv.classList.remove('hidden');
        }
        
        function log(msg) {
            console.log('LOG:', msg);
            const div = document.createElement('div');
            div.textContent = msg;
            div.className = 'py-0.5';
            const logDiv = document.getElementById('progressLog');
            logDiv.appendChild(div);
            logDiv.scrollTop = logDiv.scrollHeight;
        }
        
        async function importCourse() {
            log('🚀 Starting import...');
            
            const course = courseData.course;
            const modules = courseData.modules;
            
            // Check if course exists
            log('Checking for existing course...');
            const { data: existing, error: checkError } = await supabase
                .from('courses')
                .select('id')
                .eq('code', course.code)
                .maybeSingle();
            
            if (checkError) {
                throw new Error('Database check failed: ' + checkError.message);
            }
            
            let courseId;
            
            if (existing) {
                log('⚠️ Course exists, updating...');
                courseId = existing.id;
                
                // Delete old modules and quizzes
                const { data: oldModules } = await supabase
                    .from('modules')
                    .select('id')
                    .eq('course_id', courseId);
                
                if (oldModules && oldModules.length) {
                    log(`Deleting ${oldModules.length} old modules...`);
                    
                    const { error: delQuizError } = await supabase
                        .from('quiz_questions')
                        .delete()
                        .in('module_id', oldModules.map(m => m.id));
                    
                    if (delQuizError && delQuizError.code !== 'PGRST116') {
                        console.warn('Quiz delete warning:', delQuizError);
                    }
                    
                    const { error: delModError } = await supabase
                        .from('modules')
                        .delete()
                        .eq('course_id', courseId);
                    
                    if (delModError) {
                        throw new Error('Failed to delete old modules: ' + delModError.message);
                    }
                    
                    log('✅ Deleted old data');
                }
                
                const { error: updateError } = await supabase
                    .from('courses')
                    .update({
                        name: course.name,
                        level: course.level,
                        category: course.category,
                        description: course.description,
                        duration: course.duration,
                        price: course.price
                    })
                    .eq('id', courseId);
                
                if (updateError) {
                    throw new Error('Failed to update course: ' + updateError.message);
                }
                
                log('✅ Course updated');
                
            } else {
                log('Creating new course...');
                const { data: newCourse, error: insertError } = await supabase
                    .from('courses')
                    .insert({
                        name: course.name,
                        code: course.code,
                        level: course.level,
                        category: course.category,
                        description: course.description,
                        duration: course.duration,
                        price: course.price || 0
                    })
                    .select()
                    .single();
                
                if (insertError) {
                    throw new Error('Failed to create course: ' + insertError.message);
                }
                
                courseId = newCourse.id;
                log('✅ Course created (ID: ' + courseId.substring(0, 8) + '...)');
            }
            
            // Import modules
            log(`📚 Importing ${modules.length} modules...`);
            
            for (let i = 0; i < modules.length; i++) {
                const mod = modules[i];
                log(`  [${i+1}/${modules.length}] ${mod.title}`);
                
                const { data: newMod, error: modError } = await supabase
                    .from('modules')
                    .insert({
                        course_id: courseId,
                        title: mod.title,
                        description: mod.description || '',
                        order_number: mod.order_number,
                        content: mod.content || '',
                        content_type: mod.content_type || 'lesson',
                        duration_minutes: mod.duration_minutes,
                        video_url: mod.video_url || null
                    })
                    .select()
                    .single();
                
                if (modError) {
                    throw new Error(`Failed to insert module ${i+1}: ` + modError.message);
                }
                
                log(`    ✅ Module inserted`);
                
                // Import quiz
                if (mod.quiz && mod.quiz.questions && mod.quiz.questions.length > 0) {
                    log(`    🎯 Importing ${mod.quiz.questions.length} quiz questions...`);
                    
                    const quizData = mod.quiz.questions.map(q => ({
                        module_id: newMod.id,
                        question_text: q.question,
                        question_type: q.type === 'true_false' ? 'true_false' : 'single_choice',
                        options: q.options,
                        correct_answer: q.correct_answer,
                        points: 2,
                        order_number: q.id,
                        hint_feedback: 'Think carefully about the question',
                        correct_feedback: 'Correct!',
                        detailed_explanation: q.explanation || ''
                    }));
                    
                    const { error: quizError } = await supabase
                        .from('quiz_questions')
                        .insert(quizData);
                    
                    if (quizError) {
                        throw new Error(`Failed to insert quiz questions: ` + quizError.message);
                    }
                    
                    log(`    ✅ ${quizData.length} quiz questions inserted`);
                }
            }
            
            log('🎉 IMPORT COMPLETE!');
            
            // Show success
            document.getElementById('result').classList.remove('hidden');
            document.getElementById('result').className = 'mt-4 p-4 rounded bg-green-50 border-2 border-green-300 text-green-900';
            document.getElementById('result').innerHTML = `
                <h3 class="font-bold text-lg mb-2">✅ Success!</h3>
                <p class="mb-4">Course <strong>"${course.name}"</strong> (${course.code}) imported successfully with ${modules.length} module(s)!</p>
                <a href="https://vonwillingh-online-lms.pages.dev/courses" target="_blank" class="inline-block px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700 transition">
                    View Courses →
                </a>
            `;
        }
        
        console.log('Script loaded successfully!');
    </script>
</body>
</html>
